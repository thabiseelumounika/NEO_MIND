<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login | NeoMind</title>
    <style>
        body {
            background-color: #0f0f0f;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px #00ffcc;
            width: 400px;
        }

        h2 {
            text-align: center;
            color: #ff66cc;
            margin-bottom: 20px;
        }

        .flash-message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .success {
            background-color: #144d14;
            color: #b3ffb3;
        }

        .danger {
            background-color: #660000;
            color: #ffcccc;
        }

        label {
            display: block;
            margin-top: 15px;
            color: #00ffcc;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: #fff;
            font-size: 14px;
        }

        input[type="submit"] {
            background-color: #ff66cc;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            margin-top: 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        input[type="submit"]:hover {
            background-color: #00ffcc;
            color: #000;
        }

        .forgot {
            text-align: right;
            margin-top: 12px;
        }

        .forgot a {
            color: #ff66cc;
            text-decoration: none;
        }

        .forgot a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h2>Welcome to NeoMind</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash-message {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <label for="username">Username or Email</label>
            <input type="text" name="username" placeholder="Enter name or email" required autofocus>

            <label for="password">Password</label>
            <input type="password" name="password" required>

            <input type="submit" value="Login">


            <div class="forgot">
                <a href="{{ url_for('reset_request') }}">Forgot password?</a>
            </div>
        </form>
    </div>
</body>

</html>
