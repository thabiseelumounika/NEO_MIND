<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset Password | NeoMind</title>
    <style>
        body {
            background-color: #0d0d0d;
            font-family: 'Segoe UI', sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .reset-box {
            background: #1f1f1f;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 15px #00ffcc;
            width: 400px;
        }

        h2 {
            text-align: center;
            color: #ff66cc;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-top: 10px;
            color: #00ffcc;
            font-weight: bold;
        }

        input[type="password"],
        input[type="email"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            background-color: #333;
            color: white;
        }

        input[type="submit"] {
            background-color: #ff66cc;
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="submit"]:hover {
            background-color: #00ffcc;
            color: #000;
        }

        .back-link {
            text-align: center;
            margin-top: 10px;
        }

        .back-link a {
            color: #ff66cc;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="reset-box">
        <h2>🔐 Reset Your Password</h2>
        <form method="POST" action="{{ url_for('reset') }}">
            <input type="hidden" name="email" value="{{ email }}">

            <label for="password">New Password</label>
            <input type="password" name="password" required>

            <label for="confirm">Confirm Password</label>
            <input type="password" name="confirm" required>

            <input type="submit" value="Reset Password">

            <div class="back-link">
                <a href="{{ url_for('login') }}">Back to Login</a>
            </div>
        </form>
    </div>
</body>
</html>
