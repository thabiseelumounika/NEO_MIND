<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chat with NeoMind</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #0f0f0f;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .chat-container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
      background-color: #1a1a1a;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffcc;
      display: flex;
      flex-direction: column;
      height: 90%;
    }

    .messages {
      flex-grow: 1;
      overflow-y: auto;
      margin-bottom: 20px;
      padding-right: 10px;
    }

    .msg {
      margin: 10px 0;
    }

    .user {
      color: #ff66cc;
      text-align: right;
    }

    .bot {
      color: #00ffcc;
      text-align: left;
    }

    .input-form {
      display: flex;
      gap: 10px;
    }

    input[type="text"] {
      flex-grow: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background-color: #333;
      color: #fff;
    }

    input[type="submit"] {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background-color: #ff66cc;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #00ffcc;
      color: #000;
    }

    .back-link {
      text-align: center;
      margin-top: 15px;
    }

    .back-link a {
      color: #ff66cc;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="messages" id="messages">
      <!-- Chat messages appear here -->
    </div>

    <form class="input-form" id="chatForm">
      <input type="text" id="userInput" placeholder="Type your message..." required>
      <input type="submit" value="Send">
    </form>

    <div class="back-link">
      <a href="{{ url_for('dashboard') }}">← Back to Dashboard</a>
    </div>
  </div>

 <script>
  const chatForm = document.getElementById("chat-form");
  const userInput = document.getElementById("user-input");
  const chatLog = document.getElementById("chat-log");

  chatForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    const message = userInput.value.trim();
    if (!message) return;

    chatLog.innerHTML += `<div class="user"><strong>You:</strong> ${message}</div>`;
    userInput.value = "";

    try {
      const response = await fetch("/chat", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message })
      });

      const data = await response.json();
      chatLog.innerHTML += `<div class="bot"><strong>NeoMind:</strong> ${data.response}</div>`;
      chatLog.scrollTop = chatLog.scrollHeight;
    } catch (err) {
      chatLog.innerHTML += `<div class="bot">❌ Error: ${err}</div>`;
    }
  });
</script>

</body>
</html>
